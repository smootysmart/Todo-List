services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "03585"
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: todo_backend
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=03585
      - DB_NAME=todo_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/tasks
    container_name: todo_frontend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
